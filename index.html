<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="30">
    <title>@_36exp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <meta property="og:title" content="36exp | Photography Catalog">
    <meta property="og:description" content="An archive of exposures.">
    <meta property="og:image" content="Perspektiva/21.webp">

<body>
    <div id="fade-overlay"></div>

    <main class="gallery-container">
        <div class="intro">
            <h1>36 Exposures</h1>

        <div class="film-roll">
            <div class="leader"></div>

            <div class="frame portrait">
                <img src="Main/IMG_0336.webp" alt="Artwork">

            </div>

            <div class="frame landscape">
                <img src="Main/IMG_0638.webp" alt="Artwork">
                <div class="metadata">ISO 200 &nbsp; f/6.3 &nbsp; 1/125s</div>
            </div>

            <div class="frame portrait">
                <img src="Main/IMG_0337.webp" alt="Artwork">
                <div class="metadata">ISO 800 &nbsp; f/5.6 &nbsp; 1/30s</div>
            </div>

            <div class="frame portrait">
                <img src="Main/IMG_0345.webp" alt="Artwork">
                <div class="metadata">ISO 1600 &nbsp; f/5.6 &nbsp; 1/30s</div>
            </div>

            <div class="frame landscape">
                <img src="Main/IMG_0646.webp" alt="Artwork">
                <div class="metadata">ISO 3200 &nbsp; f/6.3 &nbsp; 1/125s</div>
            </div>

            <div class="frame portrait">
                <img src="Main/IMG_0382.webp" alt="Artwork">

            </div>

            <div class="frame portrait">
                <img src="Main/IMG_0497.webp" alt="Artwork">

            </div>

            <div class="frame landscape">
                <img src="Main/IMG_1933.webp" alt="Artwork">
                <div class="metadata">ISO 800 &nbsp; f/3.5 &nbsp; 1/100s</div>
            </div>

            <div class="frame portrait">
                <img src="Main/IMG_8507.webp" alt="Artwork">
                <div class="metadata">ISO 2000 &nbsp; f/5.6 &nbsp; 1/125s</div>
            </div>

            <div class="frame landscape">
                <img src="Main/IMG_8606.webp" alt="Artwork">
                <div class="metadata">ISO 100 &nbsp; f/8 &nbsp; 1/50s</div>
            </div>

            <div class="leader tail"></div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };

    <script defer src="/_vercel/insights/script.js"></script>
