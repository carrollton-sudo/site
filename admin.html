<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>36exp // Studio Manager</title>
    <style>
        :root { --bg: #050505; --card: #111; --border: #222; --accent: #9c6e43; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding-top: 100px; }
        header { position: fixed; top: 0; width: 100%; background: rgba(5,5,5,0.9); border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; justify-content: space-between; z-index: 100; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .album-card { background: var(--card); border: 1px solid var(--border); padding: 25px; margin-bottom: 30px; border-radius: 8px; }
        input { background: #1a1a1a; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 4px; width: 100%; margin-top: 5px; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .btn-save { background: #238636; color: white; }
        .btn-add { background: var(--accent); color: white; }
        .photo-row { display: grid; grid-template-columns: 100px 1fr 100px 40px; gap: 10px; margin-top: 10px; align-items: center; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="overlay">SYNCING...</div>

<header>
    <div style="letter-spacing: 2px;">36EXP // ADMIN</div>
    <div>
        <input type="password" id="token" placeholder="PASTE NEW GHP_ TOKEN HERE" style="width: 300px; margin: 0 10px 0 0;">
        <button class="btn btn-save" onclick="save()">Save to GitHub</button>
    </div>
</header>

<div class="container">
    <div id="albums"></div>
    <button class="btn btn-add" onclick="addAlbum()" style="width:100%">+ New Album</button>
</div>

<script>
    let config = { albums: [] };
    
    // --- CONFIGURE THIS ---
    const repo = "carroltton-sudo/site"; 
    // ----------------------

    async function init() {
        try {
            const res = await fetch('config.json');
            if (res.ok) config = await res.json();
            render();
        } catch (e) { render(); }
    }

    function addAlbum() {
        config.albums.push({ title: "New Album", folder: "Section1", cover: "1.webp", photos: [] });
        render();
    }

    function bulkAdd(idx) {
        const range = prompt("Range (e.g. 1-10):");
        if(!range) return;
        const [s, e] = range.split('-').map(Number);
        for(let i=s; i<=e; i++) config.albums[idx].photos.push({ file: `${i}.webp`, exif: "" });
        render();
    }

    function render() {
        const container = document.getElementById('albums');
        container.innerHTML = config.albums.map((a, aIdx) => `
            <div class="album-card">
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <div><label>Title</label><input value="${a.title}" oninput="config.albums[${aIdx}].title=this.value"></div>
                    <div><label>Folder</label><input value="${a.folder}" oninput="config.albums[${aIdx}].folder=this.value"></div>
                    <div><label>Cover</label><input value="${a.cover}" oninput="config.albums[${aIdx}].cover=this.value"></div>
                </div>
                <button class="btn btn-add" style="margin-top:15px" onclick="bulkAdd(${aIdx})">Add 1-10 Photos</button>
                <div id="photos-${aIdx}">
                    ${a.photos.map((p, pIdx) => `
                        <div class="photo-row">
                            <input value="${p.file}" oninput="config.albums[${aIdx}].photos[${pIdx}].file=this.value">
                            <input placeholder="EXIF" value="${p.exif}" oninput="config.albums[${aIdx}].photos[${pIdx}].exif=this.value">
                            <button class="btn" onclick="config.albums[${aIdx}].photos.splice(${pIdx},1);render()">X</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    async function save() {
        const token = document.getElementById('token').value.trim();
        if(!token) return alert("Paste your token first!");
        
        document.getElementById('overlay').style.display = 'flex';
        const url = `https://api.github.com/repos/${repo}/contents/config.json`;
        
        let sha = null;
        try {
            const getFile = await fetch(url, { 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            if (getFile.ok) {
                const data = await getFile.json();
                sha = data.sha;
            }
        } catch(e) {}

        const res = await fetch(url, {
            method: 'PUT',
            headers: { 
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify({
                message: "Update gallery",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(config, null, 2)))),
                sha: sha
            })
        });

        document.getElementById('overlay').style.display = 'none';
        if(res.ok) alert("Success! Check your site in a minute.");
        else {
            const err = await res.json();
            alert("GitHub Error: " + err.message + "\n\nTry generating a NEW token with 'repo' permissions.");
        }
    }
    init();
</script>
</body>
</html>
