<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin | 36exp Studio</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #9c6e43; --text: #fff; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 2rem; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 2rem; }
        .album { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 2rem; }
        .inputs { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 4px; }
        .photo-row { display: grid; grid-template-columns: 50px 100px 1fr 80px 40px; gap: 10px; align-items: center; padding: 5px; border-bottom: 1px solid #222; }
        .btn { cursor: pointer; padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; }
        .btn-save { background: #22c55e; color: #fff; }
        .btn-add { background: var(--accent); color: #fff; }
        .btn-danger { background: #441111; color: #ff5555; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Album Manager</h1>
            <div>
                <input type="password" id="gh-token" placeholder="GitHub Token">
                <button class="btn btn-save" onclick="saveToGithub()">Save Changes to Site</button>
            </div>
        </div>
        <div id="album-list"></div>
        <button class="btn btn-add" onclick="addAlbum()">+ New Album</button>
    </div>

    <script>
        let config = { albums: [] };
        
        // ---------------------------------------------------------
        // IMPORTANT: CHANGE THIS TO YOUR GITHUB USERNAME AND REPO!
        // Example: "johndoe/photography-portfolio"
        const repo = "YOUR_USERNAME/YOUR_REPO_NAME"; 
        // ---------------------------------------------------------

        async function loadConfig() {
            try {
                // Try fetching the live one
                const res = await fetch('config.json');
                if (res.ok) {
                    config = await res.json();
                }
            } catch (e) {
                console.log("No config found yet, starting fresh.");
            }
            render();
        }

        function addAlbum() {
            config.albums.push({ title: "New Album", folder: "AlbumX", cover: "1.webp", photos: [] });
            render();
        }

        function bulkAdd(aIdx) {
            const range = prompt("Range (e.g. 1-20):");
            if(!range) return;
            const [s, e] = range.split('-').map(Number);
            for(let i=s; i<=e; i++) config.albums[aIdx].photos.push({ file: `${i}.webp`, exif: "" });
            render();
        }

        function move(aIdx, pIdx, dir) {
            const p = config.albums[aIdx].photos;
            if(pIdx+dir < 0 || pIdx+dir >= p.length) return;
            [p[pIdx], p[pIdx+dir]] = [p[pIdx+dir], p[pIdx]];
            render();
        }

        function render() {
            const list = document.getElementById('album-list');
            list.innerHTML = config.albums.map((a, aIdx) => `
                <div class="album">
                    <div class="inputs">
                        <input value="${a.title}" oninput="config.albums[${aIdx}].title=this.value" placeholder="Title">
                        <input value="${a.folder}" oninput="config.albums[${aIdx}].folder=this.value" placeholder="Folder (e.g. Album1)">
                        <input value="${a.cover}" oninput="config.albums[${aIdx}].cover=this.value" placeholder="Cover file (e.g. 1.webp)">
                    </div>
                    <button class="btn" onclick="bulkAdd(${aIdx})">Bulk Add Photos</button>
                    <button class="btn btn-danger" onclick="config.albums.splice(${aIdx}, 1); render()" style="float:right;">Delete Album</button>
                    <div style="margin-top:15px">
                        ${a.photos.map((p, pIdx) => `
                            <div class="photo-row">
                                <span>#${pIdx+1}</span>
                                <input value="${p.file}" oninput="config.albums[${aIdx}].photos[${pIdx}].file=this.value">
                                <input value="${p.exif}" oninput="config.albums[${aIdx}].photos[${pIdx}].exif=this.value" placeholder="EXIF">
                                <div>
                                    <button onclick="move(${aIdx},${pIdx},-1)">↑</button>
                                    <button onclick="move(${aIdx},${pIdx},1)">↓</button>
                                </div>
                                <button class="btn-danger" onclick="config.albums[${aIdx}].photos.splice(${pIdx},1);render()">X</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function saveToGithub() {
            const token = document.getElementById('gh-token').value;
            if(!token) return alert("Please enter your GitHub Token!");
            if(repo === "carrollton-sudo/site") return alert("You forgot to change the repo name in the code!");

            let sha = null;
            
            // 1. Get the current file's SHA (GitHub requires this to update an existing file)
            try {
                const getRes = await fetch(`https://api.github.com/repos/${repo}/contents/config.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (getRes.ok) {
                    const fileData = await getRes.json();
                    sha = fileData.sha;
                }
            } catch (e) {
                console.log("File likely doesn't exist yet, creating a new one.");
            }

            // 2. Properly encode the JSON to Base64 (handles special characters safely)
            const jsonString = JSON.stringify(config, null, 2);
            const base64Content = btoa(unescape(encodeURIComponent(jsonString)));

            // 3. Prepare the update payload
            const payload = {
                message: "Update gallery via Admin Dashboard",
                content: base64Content
            };
            if (sha) payload.sha = sha;

            // 4. Send to GitHub
            try {
                const putRes = await fetch(`https://api.github.com/repos/${repo}/contents/config.json`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `token ${token}`, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify(payload)
                });

                if (putRes.ok) {
                    alert("Success! Site is updating. Give Vercel a minute or two to rebuild.");
                } else {
                    const errorData = await putRes.json();
                    alert(`GitHub Error: ${errorData.message}\n\nDouble check your Token has 'repo' permissions and your repo path is exactly correct.`);
                }
            } catch (error) {
                alert(`Network error: ${error.message}`);
            }
        }

        loadConfig();
    </script>
</body>
</html>
