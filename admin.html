<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>36exp // Studio Manager</title>
    <style>
        :root {
            --bg: #050505; --card: #111; --border: #222;
            --accent: #9c6e43; --text: #fff; --muted: #666;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            padding-top: 100px; line-height: 1.6;
        }
        /* Header */
        header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: rgba(5,5,5,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 12px; letter-spacing: 0.4em; font-weight: 800; text-transform: uppercase; color: var(--accent); }
        .controls { display: flex; gap: 15px; }
        
        /* Inputs */
        input {
            background: #181818; border: 1px solid var(--border);
            color: #fff; padding: 12px; border-radius: 6px; font-size: 13px;
        }
        input:focus { border-color: var(--accent); outline: none; }
        
        .btn {
            padding: 10px 20px; border-radius: 4px; border: none;
            cursor: pointer; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
        }
        .btn-save { background: #238636; color: #fff; }
        .btn-add { background: var(--accent); color: #fff; }
        .btn-danger { background: #442222; color: #ff7b7b; border: 1px solid #663333; }
        .btn-move { background: #222; color: #fff; padding: 5px 10px; }

        /* Album Cards */
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .album-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 30px; margin-bottom: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .album-meta { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .label { font-size: 9px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: block; letter-spacing: 1px; }

        /* Photo List */
        .photo-row {
            display: grid; grid-template-columns: 40px 120px 1fr 80px 40px;
            gap: 15px; align-items: center; background: #0c0c0c;
            padding: 10px 15px; border-radius: 8px; margin-bottom: 8px;
            border: 1px solid transparent;
        }
        .photo-row:hover { border-color: #333; }
        .idx { font-family: monospace; color: var(--accent); font-weight: bold; }

        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; display: none; justify-content: center; align-items: center;
            font-size: 12px; letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div id="overlay">PUSHING TO GITHUB...</div>

    <header>
        <div class="logo">36EXP // CATALOG ADMIN</div>
        <div class="controls">
            <input type="password" id="token" placeholder="NEW GITHUB TOKEN" style="width: 300px;">
            <button class="btn btn-save" onclick="save()">Save Changes</button>
        </div>
    </header>

    <div class="container">
        <div id="albums"></div>
        <button class="btn btn-add" style="width: 100%; padding: 25px;" onclick="addAlbum()">+ Add New Album Collection</button>
    </div>

    <script>
        let config = { albums: [] };
        const repo = "carroltton-sudo/site"; // Repo verified

        async function init() {
            try {
                const res = await fetch('config.json');
                if (res.ok) config = await res.json();
                render();
            } catch (e) { render(); }
        }

        function addAlbum() {
            config.albums.push({ title: "New Album", folder: "Album1", cover: "1.webp", photos: [] });
            render();
        }

        function bulkAdd(aIdx) {
            const range = prompt("Enter photo range (e.g., 1-24):");
            if(!range) return;
            const [s, e] = range.split('-').map(Number);
            for(let i=s; i<=e; i++) config.albums[aIdx].photos.push({ file: `${i}.webp`, exif: "" });
            render();
        }

        function move(aIdx, pIdx, dir) {
            const p = config.albums[aIdx].photos;
            if(pIdx+dir < 0 || pIdx+dir >= p.length) return;
            [p[pIdx], p[pIdx+dir]] = [p[pIdx+dir], p[pIdx]];
            render();
        }

        function render() {
            const container = document.getElementById('albums');
            container.innerHTML = config.albums.map((a, aIdx) => `
                <div class="album-card">
                    <div class="album-meta">
                        <div><span class="label">Title</span><input value="${a.title}" oninput="config.albums[${aIdx}].title=this.value"></div>
                        <div><span class="label">GitHub Folder</span><input value="${a.folder}" oninput="config.albums[${aIdx}].folder=this.value"></div>
                        <div><span class="label">Cover Image</span><input value="${a.cover}" oninput="config.albums[${aIdx}].cover=this.value"></div>
                    </div>
                    
                    <div style="display:flex; justify-content:space-between; margin-bottom: 20px;">
                        <button class="btn btn-add" onclick="bulkAdd(${aIdx})">Bulk Add Range</button>
                        <button class="btn btn-danger" onclick="config.albums.splice(${aIdx},1);render()">Delete Album</button>
                    </div>

                    <div class="photo-list">
                        ${a.photos.map((p, pIdx) => `
                            <div class="photo-row">
                                <span class="idx">${String(pIdx+1).padStart(2,'0')}</span>
                                <input value="${p.file}" oninput="config.albums[${aIdx}].photos[${pIdx}].file=this.value">
                                <input placeholder="EXIF" value="${p.exif}" oninput="config.albums[${aIdx}].photos[${pIdx}].exif=this.value">
                                <div style="display:flex; gap:4px">
                                    <button class="btn btn-move" onclick="move(${aIdx},${pIdx},-1)">↑</button>
                                    <button class="btn btn-move" onclick="move(${aIdx},${pIdx},1)">↓</button>
                                </div>
                                <button class="btn btn-danger" style="padding:5px 10px" onclick="config.albums[${aIdx}].photos.splice(${pIdx},1);render()">✕</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function save() {
            const token = document.getElementById('token').value;
            if(!token) return alert("Please enter a valid token.");
            document.getElementById('overlay').style.display = 'flex';

            const url = `https://api.github.com/repos/${repo}/contents/config.json`;
            let sha = null;

            // Step 1: Try to get existing file SHA
            try {
                const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
                if (getRes.ok) {
                    const data = await getRes.json();
                    sha = data.sha;
                }
            } catch(e) {}

            // Step 2: Push
            const res = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Update gallery config",
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(config, null, 2)))),
                    sha: sha 
                })
            });

            document.getElementById('overlay').style.display = 'none';
            if(res.ok) alert("Catalog updated successfully.");
            else {
                const err = await res.json();
                alert("Error: " + err.message);
            }
        }
        init();
    </script>
</body>
</html>
