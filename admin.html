<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Asset Manager | 36exp</title>
    <style>
        :root {
            --bg-base: #050505;
            --bg-card: #111111;
            --bg-input: #1a1a1a;
            --border: #2a2a2a;
            --accent: #9c6e43;
            --accent-hover: #b58355;
            --text-main: #eeeeee;
            --text-muted: #777777;
            --danger: #4a1515;
            --success: #1b4a22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            padding-top: 80px;
            padding-bottom: 60px;
        }

        .admin-header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .header-brand { font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); }

        .header-controls { display: flex; gap: 15px; align-items: center; }

        input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 14px;
            border-radius: 4px;
            font-size: 13px;
        }

        .btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 18px;
            border-radius: 4px;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            font-weight: 700;
        }

        .btn-save { background: var(--success); border-color: transparent; }
        .btn-primary { background: var(--accent); border-color: transparent; color: white; }
        .btn-danger { color: #ff6b6b; border-color: var(--danger); }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

        .album-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 40px;
        }

        .album-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-wrapper label {
            display: block;
            font-size: 9px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .photo-row {
            display: grid;
            grid-template-columns: 40px 120px 1fr 80px 40px;
            gap: 12px;
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 6px;
        }

        .photo-index { font-family: monospace; color: var(--accent); font-size: 12px; }

        .global-add {
            width: 100%; padding: 30px;
            background: transparent; border: 1px dashed var(--border);
            color: var(--text-muted); cursor: pointer; border-radius: 12px;
        }
        
        #status-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center;
            z-index: 9999; letter-spacing: 3px; font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="status-overlay">COMMITTING CHANGES...</div>

    <header class="admin-header">
        <div class="header-brand">36EXP STUDIO // ADMIN</div>
        <div class="header-controls">
            <input type="password" id="gh-token" style="width: 250px;" placeholder="GITHUB TOKEN">
            <button class="btn btn-save" onclick="saveToGithub()">Update Live Site</button>
        </div>
    </header>

    <div class="container">
        <div id="album-list"></div>
        <button class="global-add" onclick="addAlbum()">+ ADD NEW COLLECTION</button>
    </div>

    <script>
        let config = { albums: [] };
        // UPDATE THESE TWO LINES
        const username = "carroltton-sudo";
        const repoName = "site";

        async function init() {
            try {
                const res = await fetch('config.json');
                if (res.ok) config = await res.json();
                render();
            } catch (e) { console.log("Fresh start"); render(); }
        }

        function addAlbum() {
            config.albums.push({ title: "New Album", folder: "Album1", cover: "1.webp", photos: [] });
            render();
        }

        function bulkAdd(idx) {
            const range = prompt("Photo Range (e.g. 1-24):");
            if(!range) return;
            const [s, e] = range.split('-').map(Number);
            for(let i=s; i<=e; i++) config.albums[idx].photos.push({ file: `${i}.webp`, exif: "" });
            render();
        }

        function move(aIdx, pIdx, dir) {
            const p = config.albums[aIdx].photos;
            if(pIdx+dir < 0 || pIdx+dir >= p.length) return;
            [p[pIdx], p[pIdx+dir]] = [p[pIdx+dir], p[pIdx]];
            render();
        }

        function render() {
            const container = document.getElementById('album-list');
            container.innerHTML = config.albums.map((a, aIdx) => `
                <div class="album-card">
                    <div class="album-grid">
                        <div class="input-wrapper">
                            <label>Album Title</label>
                            <input value="${a.title}" oninput="config.albums[${aIdx}].title=this.value">
                        </div>
                        <div class="input-wrapper">
                            <label>GitHub Folder</label>
                            <input value="${a.folder}" oninput="config.albums[${aIdx}].folder=this.value">
                        </div>
                        <div class="input-wrapper">
                            <label>Cover Filename</label>
                            <input value="${a.cover}" oninput="config.albums[${aIdx}].cover=this.value">
                        </div>
                    </div>
                    
                    <div style="display:flex; justify-content:space-between; margin-bottom: 20px;">
                        <button class="btn btn-primary" onclick="bulkAdd(${aIdx})">Bulk Add Range</button>
                        <button class="btn btn-danger" onclick="config.albums.splice(${aIdx},1);render()">Delete Album</button>
                    </div>

                    <div class="photo-list">
                        ${a.photos.map((p, pIdx) => `
                            <div class="photo-row">
                                <span class="photo-index">${String(pIdx+1).padStart(2,'0')}</span>
                                <input value="${p.file}" oninput="config.albums[${aIdx}].photos[${pIdx}].file=this.value">
                                <input placeholder="EXIF DATA" value="${p.exif}" oninput="config.albums[${aIdx}].photos[${pIdx}].exif=this.value">
                                <div style="display:flex; gap:4px">
                                    <button class="btn" style="padding:5px 10px" onclick="move(${aIdx},${pIdx},-1)">↑</button>
                                    <button class="btn" style="padding:5px 10px" onclick="move(${aIdx},${pIdx},1)">↓</button>
                                </div>
                                <button class="btn btn-danger" style="padding:5px 10px" onclick="config.albums[${aIdx}].photos.splice(${pIdx},1);render()">✕</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function saveToGithub() {
            const token = document.getElementById('gh-token').value;
            if(!token) return alert("Enter Token");
            
            document.getElementById('status-overlay').style.display = 'flex';
            const path = "config.json";
            const url = `https://api.github.com/repos/${username}/${repoName}/contents/${path}`;
            
            let sha = null;
            try {
                const check = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
                if (check.ok) {
                    const data = await check.json();
                    sha = data.sha;
                }
            } catch(e) {}

            const content = btoa(unescape(encodeURIComponent(JSON.stringify(config, null, 2))));
            
            const response = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Studio Update",
                    content: content,
                    sha: sha // If null, GitHub creates the file
                })
            });

            document.getElementById('status-overlay').style.display = 'none';
            if(response.ok) alert("Update Successful.");
            else {
                const err = await response.json();
                alert("Error: " + err.message);
            }
        }

        init();
    </script>
</body>
</html>
