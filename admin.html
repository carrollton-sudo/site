<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Asset Manager | 36exp</title>
    <style>
        :root {
            --bg-base: #050505;
            --bg-card: #111111;
            --bg-input: #1a1a1a;
            --border: #2a2a2a;
            --accent: #9c6e43;
            --accent-hover: #b58355;
            --text-main: #eeeeee;
            --text-muted: #777777;
            --danger: #4a1515;
            --danger-hover: #6b1e1e;
            --success: #1b4a22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-top: 80px; /* Space for fixed header */
            padding-bottom: 60px;
        }

        /* --- STICKY HEADER --- */
        .admin-header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .header-brand {
            font-size: 14px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* --- FORMS & BUTTONS --- */
        input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 14px;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            width: 100%;
            transition: border-color 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .token-input { width: 300px; }

        .btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .btn:hover { background: #222; }
        
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        
        .btn-save { background: var(--success); border-color: var(--success); }
        .btn-save:hover { background: #266b31; border-color: #266b31; }
        
        .btn-danger { background: transparent; border-color: var(--danger); color: #ff6b6b; }
        .btn-danger:hover { background: var(--danger); }
        
        .btn-icon { padding: 8px 12px; }

        /* --- MAIN CONTAINER --- */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- ALBUM CARDS --- */
        .album-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .album-header-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .album-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        
        .album-actions h3 {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        /* --- PHOTO LIST --- */
        .photo-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .photo-row {
            display: grid;
            grid-template-columns: 40px 120px 1fr 90px 40px;
            gap: 15px;
            align-items: center;
            background: var(--bg-base);
            border: 1px solid var(--border);
            padding: 8px 15px;
            border-radius: 4px;
        }

        .photo-index {
            font-family: "Courier New", monospace;
            font-size: 12px;
            color: var(--accent);
            font-weight: bold;
        }

        .sort-controls {
            display: flex;
            gap: 5px;
        }

        .global-add-btn {
            display: block;
            width: 100%;
            padding: 20px;
            background: transparent;
            border: 2px dashed var(--border);
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
        }
        .global-add-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Loading Overlay */
        #loader {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 2000;
            font-size: 14px; letter-spacing: 0.2em; color: var(--accent);
        }
    </style>
</head>
<body>

    <div id="loader">SYNCING TO REPOSITORY...</div>

    <header class="admin-header">
        <div class="header-brand">36EXP | Asset Manager</div>
        <div class="header-controls">
            <input type="password" id="gh-token" class="token-input" placeholder="Paste GitHub Token here">
            <button class="btn btn-save" onclick="saveToGithub()">Commit to Live Site</button>
        </div>
    </header>

    <div class="container">
        <div id="album-list"></div>
        <button class="global-add-btn" onclick="addAlbum()">+ CREATE NEW ALBUM</button>
    </div>

    <script>
        let config = { albums: [] };
        
        // ---------------------------------------------------------
        // IMPORTANT: CHANGE THIS TO YOUR GITHUB USERNAME AND REPO!
        const repo = "carroltton-sudo/site"; 
        // ---------------------------------------------------------

        async function loadConfig() {
            try {
                const res = await fetch('config.json');
                if (res.ok) config = await res.json();
            } catch (e) {
                console.log("No config found, initializing empty workspace.");
            }
            render();
        }

        function addAlbum() {
            config.albums.push({ title: "Untitled Album", folder: "AlbumX", cover: "1.webp", photos: [] });
            render();
        }

        function bulkAdd(aIdx) {
            const range = prompt("Enter file range (e.g. 1-24):");
            if(!range) return;
            const [s, e] = range.split('-').map(Number);
            if (!s || !e || s > e) return alert("Invalid range format.");
            for(let i=s; i<=e; i++) config.albums[aIdx].photos.push({ file: `${i}.webp`, exif: "" });
            render();
        }

        function move(aIdx, pIdx, dir) {
            const p = config.albums[aIdx].photos;
            if(pIdx+dir < 0 || pIdx+dir >= p.length) return;
            [p[pIdx], p[pIdx+dir]] = [p[pIdx+dir], p[pIdx]];
            render();
        }

        function render() {
            const list = document.getElementById('album-list');
            list.innerHTML = config.albums.map((a, aIdx) => `
                <div class="album-card">
                    <div class="album-header-grid">
                        <div class="input-group">
                            <label>Album Title</label>
                            <input value="${a.title}" oninput="config.albums[${aIdx}].title=this.value" placeholder="e.g. Origin I">
                        </div>
                        <div class="input-group">
                            <label>Source Folder</label>
                            <input value="${a.folder}" oninput="config.albums[${aIdx}].folder=this.value" placeholder="e.g. Album1">
                        </div>
                        <div class="input-group">
                            <label>Cover Image</label>
                            <input value="${a.cover}" oninput="config.albums[${aIdx}].cover=this.value" placeholder="e.g. 1.webp">
                        </div>
                    </div>

                    <div class="album-actions">
                        <h3>EXPOSURES (${a.photos.length})</h3>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn" onclick="bulkAdd(${aIdx})">Bulk Add Range</button>
                            <button class="btn btn-danger" onclick="if(confirm('Delete entire album?')) { config.albums.splice(${aIdx}, 1); render(); }">Delete Album</button>
                        </div>
                    </div>

                    <div class="photo-list">
                        ${a.photos.map((p, pIdx) => `
                            <div class="photo-row">
                                <span class="photo-index">${String(pIdx+1).padStart(2, '0')}A</span>
                                <input value="${p.file}" oninput="config.albums[${aIdx}].photos[${pIdx}].file=this.value" placeholder="File">
                                <input value="${p.exif}" oninput="config.albums[${aIdx}].photos[${pIdx}].exif=this.value" placeholder="EXIF string (e.g. Canon EOS M50...)">
                                <div class="sort-controls">
                                    <button class="btn btn-icon" title="Move Up" onclick="move(${aIdx},${pIdx},-1)">↑</button>
                                    <button class="btn btn-icon" title="Move Down" onclick="move(${aIdx},${pIdx},1)">↓</button>
                                </div>
                                <button class="btn btn-danger btn-icon" title="Remove Photo" onclick="config.albums[${aIdx}].photos.splice(${pIdx},1);render()">✕</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function saveToGithub() {
            const token = document.getElementById('gh-token').value;
            if(!token) return alert("Please paste your GitHub Token at the top.");
            if(repo === "YOUR_USERNAME/YOUR_REPO_NAME") return alert("Developer error: Update 'repo' string in admin.html code.");

            document.getElementById('loader').style.display = 'flex';
            let sha = null;
            
            try {
                const getRes = await fetch(`https://api.github.com/repos/${repo}/contents/config.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (getRes.ok) {
                    const fileData = await getRes.json();
                    sha = fileData.sha;
                }
            } catch (e) {
                console.log("Creating new config file.");
            }

            const jsonString = JSON.stringify(config, null, 2);
            const base64Content = btoa(unescape(encodeURIComponent(jsonString)));

            const payload = {
                message: "Catalog updated via Studio Manager",
                content: base64Content
            };
            if (sha) payload.sha = sha;

            try {
                const putRes = await fetch(`https://api.github.com/repos/${repo}/contents/config.json`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `token ${token}`, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify(payload)
                });

                if (putRes.ok) {
                    alert("Sync Successful. Vercel is rebuilding your site now.");
                } else {
                    const err = await putRes.json();
                    alert(`Sync Failed: ${err.message}`);
                }
            } catch (error) {
                alert(`Network error: ${error.message}`);
            }
            document.getElementById('loader').style.display = 'none';
        }

        loadConfig();
    </script>
</body>
</html>
